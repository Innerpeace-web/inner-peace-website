<main id="main" class="login-card">
  <div class="login-brand">
    <img src="https://innerpeace.vision/wp-content/uploads/2023/12/cropped-Logo-270x270.png" alt="" width="44" height="44">
    <span><strong>Staff Portal</strong><small>Inner Peace In-Home Nursing &amp; Care</small></span>
  </div>
  <h1>Sign in</h1>
  <p class="login-sub">Welcome back. Please sign in with your Inner Peace staff account.</p>

  <form class="form" name="staff-login" onsubmit="window.location.href='dashboard.html';return false;">
    <div class="field">
      <label for="l-user">Username or email</label>
      <input type="text" id="l-user" name="username" autocomplete="username" required>
    </div>
    <div class="field">
      <label for="l-pass">Password</label>
      <input type="password" id="l-pass" name="password" autocomplete="current-password" required>
    </div>
    <button class="btn btn--primary btn--lg btn--block" type="submit">Sign in</button>
  </form>

  <p class="login-note">Authorised personnel only. Trouble signing in? Contact Admin on
    <a href="tel:+61419853811">0419&nbsp;853&nbsp;811</a>.<br>
    <a href="../index.html">← Back to main website</a></p>
</main>
